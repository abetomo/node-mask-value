version: 2
updates:
  - package-ecosystem: "github-actions"
    target-branch: "main"
    directory: "/"
    schedule:
        interval: "weekly"
  - package-ecosystem: "npm"
    target-branch: "main"
    directory: "/"
    schedule:
        interval: "weekly"
    groups:
      eslint:
        patterns:
          - "@eslint-community/*"
          - "@eslint/*"
          - "@types/eslint*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "typescript-eslint*"
